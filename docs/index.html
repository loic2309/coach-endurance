<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coach Endurance — 20km & 70.3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #0a0d12;
  --bg-2: #0e121a;
  --surface: #141925;
  --surface-2: #1b2230;
  --surface-3: #232c3d;
  --border: rgba(255, 255, 255, 0.07);
  --border-strong: rgba(255, 255, 255, 0.12);
  --text: #eef2f7;
  --muted: #8b97a8;
  --faint: #5d6878;

  --accent: #22d3ee;       /* cyan */
  --accent-2: #34d399;     /* green / performance */
  --accent-soft: rgba(34, 211, 238, 0.14);

  --run: #34d399;
  --bike: #fbbf24;
  --swim: #38bdf8;
  --strength: #c084fc;
  --brick: #fb7185;

  --ok: #34d399;
  --warn: #fbbf24;
  --bad: #fb7185;

  --r-sm: 10px;
  --r: 14px;
  --r-lg: 20px;
  --shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
  --sidebar-w: 244px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(1200px 600px at 100% -10%, rgba(34, 211, 238, 0.06), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(52, 211, 153, 0.05), transparent 55%),
    var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3 { margin: 0; letter-spacing: -0.02em; }
a { color: inherit; text-decoration: none; }
.num { font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }
.faint { color: var(--faint); }
.small { font-size: 0.82rem; }

/* ---------------- App shell ---------------- */
.app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

.sidebar {
  position: sticky; top: 0; height: 100vh;
  background: linear-gradient(180deg, var(--bg-2), var(--bg));
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 22px 16px;
}
.brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px 22px; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #04161a; font-weight: 900; font-size: 0.95rem;
  display: grid; place-items: center; box-shadow: 0 4px 14px rgba(34, 211, 238, 0.35);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.brand-text strong { font-size: 0.98rem; }
.brand-text span { font-size: 0.74rem; color: var(--muted); }

.nav { display: flex; flex-direction: column; gap: 4px; }
.nav a {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--r-sm); color: var(--muted); font-weight: 600; font-size: 0.9rem;
  transition: background 0.15s, color 0.15s;
}
.nav a svg { width: 19px; height: 19px; fill: currentColor; flex-shrink: 0; }
.nav a:hover { background: var(--surface); color: var(--text); }
.nav a.active { background: var(--accent-soft); color: var(--accent); }

.sidebar-foot { margin-top: auto; }
.garmin-mini { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; }
.garmin-mini .gm-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
.dot.off { background: var(--faint); }

/* ---------------- Main ---------------- */
.main { min-width: 0; }
.topbar {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 16px;
  padding: 26px 34px 18px; position: sticky; top: 0; z-index: 5;
  background: linear-gradient(180deg, var(--bg) 70%, transparent);
}
.topbar h1 { font-size: 1.6rem; font-weight: 800; }
.page-sub { margin: 4px 0 0; color: var(--muted); font-size: 0.9rem; }
.topbar-chips { display: flex; gap: 10px; flex-wrap: wrap; }
.chip {
  background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
  padding: 8px 14px; font-size: 0.82rem; display: flex; align-items: center; gap: 8px;
}
.chip b { color: var(--accent); font-weight: 800; }

.view { padding: 8px 34px 60px; }
@media (max-width: 560px) { .topbar, .view { padding-left: 18px; padding-right: 18px; } }

/* ---------------- Cards & grid ---------------- */
.grid { display: grid; gap: 16px; }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-auto { grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }
@media (max-width: 900px) { .cols-2, .cols-3 { grid-template-columns: 1fr; } }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 20px 22px; box-shadow: var(--shadow);
}
.card.glow { background: linear-gradient(160deg, var(--surface-2), var(--surface)); border-color: var(--border-strong); }
.card h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }
.card h2.with-eyebrow { margin-bottom: 4px; }
.eyebrow { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.7rem; color: var(--muted); font-weight: 700; margin-bottom: 18px; }
.section-title { font-size: 1.15rem; font-weight: 800; margin: 26px 2px 14px; }

/* Big metric */
.metric { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
.metric.cyan { color: var(--accent); }
.metric.green { color: var(--accent-2); }
.metric-sub { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

/* Goal hero card */
.goal-hero { display: flex; gap: 22px; align-items: center; }
.goal-hero .info { flex: 1; min-width: 0; }
.goal-hero .label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }
.goal-hero h3 { font-size: 1.15rem; margin: 4px 0 14px; }
.kv { display: flex; justify-content: space-between; padding: 7px 0; border-top: 1px solid var(--border); font-size: 0.9rem; }
.kv:first-of-type { border-top: none; }
.kv b { font-weight: 800; font-variant-numeric: tabular-nums; }

.badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.02em; }
.badge.green { background: rgba(52, 211, 153, 0.16); color: var(--accent-2); }
.badge.amber { background: rgba(251, 191, 36, 0.16); color: var(--warn); }
.badge.cyan { background: var(--accent-soft); color: var(--accent); }

/* Progress ring */
.ring { position: relative; width: 116px; height: 116px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring .ring-label { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
.ring .ring-label b { font-size: 1.5rem; font-weight: 900; }
.ring .ring-label span { font-size: 0.66rem; color: var(--muted); display: block; }

/* Pace chips */
.paces { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 10px; }
.pace-chip { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 12px; text-align: center; }
.pace-chip .k { display: block; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; margin-bottom: 6px; }
.pace-chip .v { font-size: 1.18rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.pace-chip .pgoal { display: block; font-size: 0.68rem; color: var(--faint); margin-top: 4px; font-variant-numeric: tabular-nums; }
.pace-chip.hl .pgoal { color: var(--accent); opacity: 0.8; }
.pace-chip.hl { background: linear-gradient(160deg, rgba(34,211,238,0.16), var(--surface-2)); border-color: var(--accent); }
.pace-chip.hl .v { color: var(--accent); }

/* Phase timeline */
.timeline { display: flex; gap: 8px; margin: 6px 0 4px; }
.tl-seg { flex: 1; border-radius: 8px; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); position: relative; overflow: hidden; }
.tl-seg .bar { position: absolute; left: 0; top: 0; height: 3px; width: 100%; opacity: 0.5; }
.tl-seg.active { border-color: var(--border-strong); background: var(--surface-3); }
.tl-seg.active::after { content: "EN COURS"; position: absolute; top: 10px; right: 12px; font-size: 0.58rem; font-weight: 800; color: var(--accent); letter-spacing: 0.08em; }
.tl-seg .ph { font-size: 0.9rem; font-weight: 800; margin-bottom: 2px; }
.tl-seg .pd { font-size: 0.72rem; color: var(--muted); }
@media (max-width: 900px) { .timeline { flex-direction: column; } }

.progress-track { height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin: 14px 0 6px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 999px; }

/* Phase guide cards */
.guide h3 { font-size: 1.1rem; }
.guide .sub { color: var(--accent); font-size: 0.82rem; font-weight: 700; margin: 2px 0 12px; }
.guide p { color: var(--muted); font-size: 0.9rem; }
.guide ul { margin: 8px 0 0; padding-left: 0; list-style: none; }
.guide li { display: flex; gap: 8px; padding: 5px 0; font-size: 0.88rem; }
.guide li::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-2); margin-top: 8px; flex-shrink: 0; }
.guide .block-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 800; color: var(--muted); margin-top: 16px; }
.guide .watch li::before { background: var(--warn); }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 0.78rem; }

/* Week */
.week-head { display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
.week-nav { display: flex; align-items: center; gap: 8px; }
.iconbtn { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; border-radius: 10px; cursor: pointer; font-size: 1rem; transition: 0.15s; }
.iconbtn:hover { background: var(--surface-2); border-color: var(--border-strong); }
#week-label { min-width: 150px; text-align: center; font-weight: 700; }
.phase-banner { padding: 14px 18px; border-radius: var(--r); margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); }
.phase-banner .pb-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.phase-banner b { font-weight: 800; }
.phase-banner .deload { color: var(--warn); font-weight: 800; font-size: 0.78rem; }

.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
@media (max-width: 1100px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .week-grid { grid-template-columns: 1fr; } }
.day { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px; min-height: 110px; }
.day.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-soft); }
.day .dh { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.day .dh .wd { font-weight: 700; font-size: 0.82rem; }
.day .dh .dt { font-size: 0.72rem; color: var(--muted); }
.day .rest { font-size: 0.78rem; color: var(--faint); padding: 4px 2px; }

.sess { background: var(--surface-2); border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 10px; padding: 9px 10px; margin-bottom: 7px; cursor: pointer; transition: 0.13s; }
.sess:hover { background: var(--surface-3); transform: translateY(-1px); }
.sess.run { border-left-color: var(--run); }
.sess.bike { border-left-color: var(--bike); }
.sess.swim { border-left-color: var(--swim); }
.sess.strength { border-left-color: var(--strength); }
.sess.brick { border-left-color: var(--brick); }
.sess.done { opacity: 0.5; }
.sess.done .st { text-decoration: line-through; }
.sess.skipped { opacity: 0.4; }
.sess .top { display: flex; justify-content: space-between; gap: 6px; }
.sess .st { font-weight: 700; font-size: 0.82rem; line-height: 1.25; }
.sess .stat { font-size: 0.8rem; }
.sess .sm { font-size: 0.72rem; color: var(--muted); margin-top: 3px; font-variant-numeric: tabular-nums; }

/* Drawer */
.drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); opacity: 0; pointer-events: none; transition: 0.2s; z-index: 40; }
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; height: 100vh; width: 420px; max-width: 92vw; z-index: 50;
  background: var(--bg-2); border-left: 1px solid var(--border-strong); box-shadow: -10px 0 40px rgba(0,0,0,0.5);
  transform: translateX(100%); transition: transform 0.24s cubic-bezier(.4,0,.2,1); padding: 26px; overflow-y: auto;
}
.drawer.open { transform: translateX(0); }
.drawer .dr-close { position: absolute; top: 18px; right: 18px; background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; }
.drawer .dr-sport { display: inline-block; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 999px; margin-bottom: 12px; }
.drawer h2 { font-size: 1.3rem; margin-bottom: 8px; }
.drawer .dr-meta { display: flex; gap: 10px; margin: 14px 0; flex-wrap: wrap; }
.drawer .dr-meta .m { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.drawer .dr-meta .m .k { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.drawer .dr-meta .m .v { font-size: 1.15rem; font-weight: 800; }
.drawer .dr-desc { color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; line-height: 1.6; }
.dr-actions { display: flex; gap: 8px; margin-top: 18px; }

/* Buttons */
.btn { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #04161a; border: none; padding: 11px 18px; border-radius: 11px; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.15s; }
.btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn:disabled { opacity: 0.6; cursor: default; transform: none; }
.btn.ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn.ghost:hover { background: var(--surface-2); }
.btn.full { width: 100%; }
.btn.ok.sel { background: rgba(52,211,153,0.2); color: var(--ok); border: 1px solid var(--ok); }
.btn.bad.sel { background: rgba(251,113,133,0.2); color: var(--bad); border: 1px solid var(--bad); }

/* Principles */
.principle { display: flex; gap: 14px; }
.principle .pic { width: 42px; height: 42px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
.principle .pic svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
.principle h3 { font-size: 0.98rem; margin-bottom: 5px; }
.principle p { color: var(--muted); font-size: 0.86rem; margin: 0; }

/* Strategy */
.strat .goal-line { color: var(--accent-2); font-weight: 700; font-size: 0.86rem; margin-bottom: 14px; }
.strat .block-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 800; color: var(--muted); margin: 16px 0 8px; }
.strat ol { margin: 0; padding-left: 20px; }
.strat ol li { padding: 4px 0; font-size: 0.9rem; }
.strat ul.plain { list-style: none; padding: 0; margin: 0; }
.strat ul.plain li { display: flex; gap: 8px; padding: 4px 0; font-size: 0.9rem; }
.strat ul.plain li::before { content: "→"; color: var(--accent); }
.strat .mental { background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 10px; padding: 12px 14px; margin-top: 14px; font-size: 0.88rem; font-style: italic; color: var(--text); }

/* Best efforts */
.effort { text-align: center; }
.effort .sport-ico { font-size: 1.6rem; }
.effort .v { font-size: 1.5rem; font-weight: 900; margin: 6px 0 2px; }

/* Gamification */
.gamebar { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
.lvl-badge { width: 70px; height: 70px; border-radius: 50%; display: grid; place-content: center; text-align: center;
  background: conic-gradient(var(--accent), var(--accent-2), var(--accent)); color: #04161a; font-weight: 800; font-size: 0.7rem;
  box-shadow: 0 4px 16px rgba(34,211,238,0.35); }
.lvl-badge b { display: block; font-size: 1.5rem; line-height: 1; }
.gb-main { flex: 1; min-width: 200px; }
.gb-top { display: flex; justify-content: space-between; align-items: baseline; }
.gb-top b { font-size: 1.3rem; color: var(--accent); }
.gb-stat { text-align: center; }
.gb-flame { font-size: 1.3rem; font-weight: 800; }
@media (max-width: 560px) { .gamebar { gap: 14px; } .gb-main { order: 3; flex-basis: 100%; } }

.badge-card { display: flex; gap: 14px; align-items: center; }
.badge-card.locked { opacity: 0.62; }
.badge-card .b-ico { font-size: 2rem; width: 54px; height: 54px; border-radius: 14px; display: grid; place-items: center;
  background: var(--surface-2); flex-shrink: 0; }
.badge-card.earned .b-ico { background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(52,211,153,0.25)); }
.badge-card .b-info { min-width: 0; flex: 1; }
.badge-card h3 { font-size: 0.95rem; }

.empty { color: var(--muted); text-align: center; padding: 30px; font-size: 0.9rem; }
.loading { color: var(--muted); padding: 40px; text-align: center; }
.errbar { background: rgba(251,113,133,0.15); border: 1px solid var(--bad); color: #fecdd3; padding: 12px 16px; border-radius: var(--r); margin-bottom: 16px; font-size: 0.88rem; }

/* Mobile nav */
@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; bottom: 0; top: auto; left: 0; right: 0; height: auto; width: 100%;
    flex-direction: row; align-items: center; padding: 8px; border-right: none; border-top: 1px solid var(--border-strong);
    z-index: 30; background: var(--bg-2);
  }
  .brand, .sidebar-foot { display: none; }
  .nav { flex-direction: row; width: 100%; justify-content: space-around; gap: 0; }
  .nav a { flex-direction: column; gap: 3px; padding: 6px; font-size: 0.62rem; text-align: center; }
  .nav a span { font-size: 0.6rem; }
  .main { padding-bottom: 70px; }
  .topbar { padding: 18px 18px 12px; }
}

</style>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CE</div>
        <div class="brand-text">
          <strong>Coach Endurance</strong>
          <span>20km · 70.3</span>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a href="#/overview" data-route="overview">
          <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg>
          <span>Vue d'ensemble</span>
        </a>
        <a href="#/plan" data-route="plan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
          <span>Mon plan</span>
        </a>
        <a href="#/week" data-route="week">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>Cette semaine</span>
        </a>
        <a href="#/load" data-route="load">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="12" y="6" width="3" height="11"/><rect x="17" y="13" width="3" height="4"/></svg>
          <span>Charge</span>
        </a>
        <a href="#/defis" data-route="defis">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M17 5h3v2a3 3 0 0 1-3 3M7 5H4v2a3 3 0 0 0 3 3"/></svg>
          <span>Défis</span>

// ---------------- Helpers ----------------
const $ = (s, r = document) => r.querySelector(s);

const el = (html) => { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; };

// Mode statique : si des données sont embarquées (build GitHub Pages / fichier local),
// on sert tout depuis window.__COACH_DATA__ et on persiste les séances via localStorage.
const STATIC = typeof window !== "undefined" && !!window.__COACH_DATA__;

function _monday(iso) {
  const d = new Date((iso || new Date().toISOString().slice(0, 10)) + "T00:00:00");
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return d.toISOString().slice(0, 10);
}

function staticApi(path, opts) {
  const D = window.__COACH_DATA__;
  if (opts && opts.method === "POST") {
    if (path.startsWith("/api/session-status")) {
      const b = JSON.parse(opts.body), key = `ss::${b.plan_date}::${b.slug}`;
      if (b.status === "planned") localStorage.removeItem(key);
      else localStorage.setItem(key, b.status);
      return { ok: true };
    }
    if (path.startsWith("/api/sync")) throw new Error("Synchro Garmin indisponible en version statique. Lance l'app complète pour mettre à jour.");
    return { ok: true };
  }
  if (path.startsWith("/api/overview")) return D.overview;
  if (path.startsWith("/api/coaching")) return D.coaching;
  if (path.startsWith("/api/gamification")) return D.gamification;
  if (path.startsWith("/api/load")) return D.load;
  if (path.startsWith("/api/week")) {
    const d = new URL(path, "http://x").searchParams.get("d");
    const mon = _monday(d);
    let wk = D.weeks.find((w) => w.monday === mon) || D.weeks[0];
    wk = JSON.parse(JSON.stringify(wk));
    for (const day of wk.days)
      for (const s of day.sessions)
        s.status = localStorage.getItem(`ss::${day.date}::${s.slug}`) || "planned";
    return wk;
  }
  return {};
}

async function api(path, opts) {
  if (STATIC) return staticApi(path, opts);
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

}

async function topbar(route) {
  const titles = {
    overview: ["Vue d'ensemble", "Ta progression vers le 20km et le 70.3"],
    plan: ["Mon plan", "Périodisation sur 12 mois, phase par phase"],
    week: ["Cette semaine", "Tes séances, à cocher au fil de l'eau"],
    load: ["Charge d'entraînement", "Ce que tu as réellement fait (Garmin)"],
    defis: ["Défis", "Ton niveau, ta série et tes badges"],
    coaching: ["Conseils", "Méthode et stratégie de course"],
  };
  const [t, s] = titles[route] || titles.overview;
  $("#page-title").textContent = t;
  $("#page-sub").textContent = s;
  const o = await getOverview();
  const g = o.goals;
  $("#topbar-chips").innerHTML = `
    <div class="chip">🏃 20km <b>J-${g.race_20km.days_left}</b></div>
    <div class="chip">🏊🚴🏃 70.3 <b>J-${g.race_703.days_left}</b></div>`;
}

// ---------------- Garmin mini (sidebar) ----------------
async function renderGarminMini() {
  const o = await getOverview();
  const gm = o.garmin;
  const node = $("#garmin-mini");
  if (STATIC) {
    const built = window.__COACH_DATA__.built_at;
    node.innerHTML = `<div class="gm-row"><span><span class="dot on"></span>Garmin</span><span class="muted">figé</span></div>
      <div class="small muted">Version statique${built ? ` · ${built.slice(0, 10)}` : ""}. Lance l'app complète pour synchroniser.</div>`;
    return;
  }
  node.innerHTML = `
    <div class="gm-row"><span><span class="dot ${gm.configured ? "on" : "off"}"></span>Garmin</span>
      <span class="muted">${gm.last_sync ? "à jour" : "non lié"}</span></div>
    <button class="btn full" id="sync-btn">Synchroniser</button>
    <div class="small muted" id="sync-msg" style="margin-top:8px"></div>`;
  $("#sync-btn").onclick = doSync;
}
async function doSync() {
  const btn = $("#sync-btn"), msg = $("#sync-msg");
  btn.disabled = true; msg.textContent = "Connexion à Garmin…";
  try {
    const r = await api("/api/sync", { method: "POST" });
    msg.textContent = `✅ ${r.imported} activités importées.`;
    delete cache.overview; delete cache.gam; await renderGarminMini();
    if (location.hash.includes("load") || location.hash === "" || location.hash.includes("overview")) render();
  } catch (e) { msg.textContent = "⚠️ " + e.message; }
  finally { const b = $("#sync-btn"); if (b) b.disabled = false; }
}

// ---------------- Views ----------------

  const o = await getOverview();
  const g = o.goals, p = o.paces, pp = o.plan_progress;
  const v = $("#view");

  const card20 = `<div class="card glow"><div class="goal-hero">
    ${ring(100 - Math.round(g.race_20km.days_left / 3.65), "J-" + g.race_20km.days_left, "avant la course", "#34d399")}
    <div class="info">
      <div class="label">🏃 20km de Bruxelles</div>
      <h3>${fmtDate(g.race_20km.date, { day: "2-digit", month: "long", year: "numeric" })}</h3>
      <div class="kv"><span>PR actuel <span class="badge">Garmin</span></span><b>${hms(g.race_20km.current_min)}</b></div>
      <div class="kv"><span>🎯 Objectif <span class="badge cyan">on y va</span></span><b>${hms(g.race_20km.goal_realistic_min)}</b></div>
      <div class="kv"><span>Stretch <span class="badge amber">si ça claque</span></span><b>${hms(g.race_20km.goal_stretch_min)}</b></div>
    </div></div></div>`;

  const card70 = `<div class="card glow"><div class="goal-hero">
    ${ring(100 - Math.round(g.race_703.days_left / 3.71), "J-" + g.race_703.days_left, "avant la course", "#22d3ee")}
    <div class="info">
      <div class="label">🏊🚴🏃 Half-Ironman 70.3</div>
      <h3>${fmtDate(g.race_703.date, { day: "2-digit", month: "long", year: "numeric" })}</h3>
      <div class="kv"><span>Actuel</span><b>${hms(g.race_703.current_min)}</b></div>
      <div class="kv"><span>Objectif <span class="badge green">réaliste</span></span><b>sub-${Math.floor(g.race_703.goal_min / 60)}h</b></div>
      <div class="kv"><span>Gain clé</span><b>Vélo + transitions</b></div>

  const z = p.zones;
  const paces = `<div class="card"><h2 class="with-eyebrow">Allures d'entraînement 🎯</h2>
    <div class="eyebrow">Aujourd'hui → objectif · montée progressive (avancement ${p.progress_pct}%)</div>
    <div class="paces">
      ${pchip("Récup / Easy", z.easy)}${pchip("Sortie longue", z.long)}
      ${pchip("Tempo / allure 20km", z.tempo, true)}${pchip("Seuil", z.threshold)}
      ${pchip("VO2max (~5km)", z.vo2)}
    </div>
    <p class="small muted" style="margin:14px 0 0">${p.from_garmin ? `Ancrées sur tes <b>vraies allures Garmin</b> (Z2 réelle ${p.measured_easy})` : "Basées sur ton niveau actuel"} et montant <b>crescendo</b> vers tes allures objectif <b>1h05</b>. Le grand chiffre = ce que tu vises <b>maintenant</b>, la petite ligne = la cible 1h05.</p></div>`;

  const progress = `<div class="card"><h2 class="with-eyebrow">Avancement du plan</h2>
    <div class="eyebrow">${fmtDate(pp.start)} → ${fmtDate(pp.end)}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pp.pct}%"></div></div>
    <div style="display:flex;justify-content:space-between" class="small muted">
      <span>Semaine ${pp.elapsed_weeks} / ${pp.total_weeks}</span><span>${pp.pct}%</span></div></div>`;

  const gam = await getGamification();
  const gamStrip = `<div class="card glow gamebar">
    <div class="lvl"><div class="lvl-badge">Niv.<b>${gam.level}</b></div></div>
    <div class="gb-main">
      <div class="gb-top"><span><b>${gam.xp.toLocaleString("fr-FR")}</b> XP</span>
        <span class="muted small">${gam.xp_into_level}/${gam.xp_for_next} vers niv. ${gam.level + 1}</span></div>
      <div class="progress-track" style="margin:8px 0 0"><div class="progress-fill" style="width:${gam.level_progress_pct}%"></div></div>
    </div>
    <div class="gb-stat"><div class="gb-flame">🔥 ${gam.streak_weeks}</div><span class="muted small">sem. d'affilée</span></div>
    <div class="gb-stat"><div class="gb-flame">🏆 ${gam.badges_earned}/${gam.badges_total}</div><span class="muted small">badges</span></div>
  </div>`;

  v.innerHTML = `
    ${gamStrip}
    <div style="height:16px"></div>

}

async function viewDefis() {
  const gam = await getGamification();
  const grid = gam.badges.map((b) => `
    <div class="card badge-card ${b.earned ? "earned" : "locked"}">
      <div class="b-ico">${b.icon}</div>
      <div class="b-info"><h3>${b.title}</h3><p class="muted small">${b.desc}</p>
        ${b.earned ? '<span class="badge green">obtenu ✓</span>'
          : `<div class="progress-track" style="margin-top:8px"><div class="progress-fill" style="width:${b.progress * 100}%"></div></div>
             <span class="faint small">${Math.round(b.progress * 100)}%</span>`}
      </div></div>`).join("");

  $("#view").innerHTML = `
    <div class="card glow gamebar">
      <div class="lvl"><div class="lvl-badge">Niv.<b>${gam.level}</b></div></div>
      <div class="gb-main"><div class="gb-top"><span><b>${gam.xp.toLocaleString("fr-FR")}</b> XP</span>
        <span class="muted small">plus que ${gam.xp_for_next - gam.xp_into_level} XP pour le niveau ${gam.level + 1}</span></div>
        <div class="progress-track" style="margin:8px 0 0"><div class="progress-fill" style="width:${gam.level_progress_pct}%"></div></div></div>
      <div class="gb-stat"><div class="gb-flame">🔥 ${gam.streak_weeks}</div><span class="muted small">semaines</span></div>
    </div>
    <div class="section-title">Badges — ${gam.badges_earned}/${gam.badges_total} obtenus</div>
    <div class="grid cols-3">${grid}</div>
    <p class="small muted" style="margin-top:14px">Tu gagnes de l'XP à chaque sortie (durée + distance + dénivelé). Reste régulier pour faire grimper ta série 🔥 et débloquer les badges.</p>`;
}
function pchip(k, z, hl) { return `<div class="pace-chip ${hl ? "hl" : ""}"><span class="k">${k}</span><span class="v">${z.now}</span><span class="pgoal">→ ${z.goal}</span></div>`; }

async function viewPlan() {
  const c = await getCoaching();
  const o = await getOverview();
  const phases = ["base", "build", "specific", "peak"];
  const meta = {
    base: { name: "Base aérobie", color: "#22d3ee" }, build: { name: "Force & hiver", color: "#c084fc" },
    specific: { name: "Spécifique", color: "#fb7185" }, peak: { name: "Affûtage", color: "#fbbf24" },
  };
  // phase courante approximée par avancement
  const pct = o.plan_progress.pct;
  const activeIdx = pct < 34 ? 0 : pct < 64 ? 1 : pct < 90 ? 2 : 3;

  const timeline = `<div class="timeline">${phases.map((k, i) => `
    <div class="tl-seg ${i === activeIdx ? "active" : ""}"><div class="bar" style="background:${meta[k].color}"></div>
      <div class="ph">${meta[k].name}</div><div class="pd">${c.phase_guides[k].subtitle.split("—")[1]?.trim() || ""}</div></div>`).join("")}</div>`;

  const guides = phases.map((k) => {
    const gp = c.phase_guides[k];
    return `<div class="card guide" style="border-left:4px solid ${meta[k].color}">
      <h3>${gp.subtitle.split("—")[0].trim()}</h3>
      <div class="sub" style="color:${meta[k].color}">${gp.subtitle.split("—")[1]?.trim() || ""}</div>
      <p>${gp.summary}</p>
      <div class="block-title">Objectifs</div><ul>${gp.objectives.map((x) => `<li>${x}</li>`).join("")}</ul>
      <div class="block-title">Séances clés</div><div class="tag-row">${gp.key_sessions.map((x) => `<span class="tag">${x}</span>`).join("")}</div>
      <div class="block-title">Points de vigilance</div><ul class="watch">${gp.watch_outs.map((x) => `<li>${x}</li>`).join("")}</ul>
      <div class="block-title">À suivre</div><div class="tag-row">${gp.metrics.map((x) => `<span class="tag">📊 ${x}</span>`).join("")}</div>
    </div>`;
  }).join("");

  $("#view").innerHTML = `<div class="card">${timeline}</div>
    <div class="section-title">Les 4 phases en détail</div>
    <div class="grid cols-2">${guides}</div>`;
}

async function viewWeek(dateIso) {
  const q = dateIso ? `?d=${dateIso}` : "";
  const wk = await api("/api/week" + q);
  currentMonday = wk.monday;
  weekData = wk;
  const today = new Date().toISOString().slice(0, 10);

  const ph = wk.phase;
  const days = wk.days.map((day) => {
    const sess = day.sessions.filter((s) => s.sport !== "rest" && s.sport !== "mobility").length
      ? day.sessions.map((s, i) => sessCard(day.date, i, s)).join("")
      : day.sessions.map((s, i) => sessCard(day.date, i, s)).join("") || `<div class="rest">Repos</div>`;
    return `<div class="day ${day.date === today ? "today" : ""}">
      <div class="dh"><span class="wd">${day.weekday}</span><span class="dt">${fmtDate(day.date)}</span></div>
      ${sess}</div>`;
  }).join("");

  $("#view").innerHTML = `
    <div class="week-head">
      <div class="week-nav">
        <button class="iconbtn" id="prev-week">◀</button>
        <span id="week-label">Sem. du ${fmtDate(wk.monday)}</span>
        <button class="iconbtn" id="next-week">▶</button>
      </div>
      <div class="chip">Volume planifié <b>${wk.total_hours}h</b></div>
    </div>
    <div class="phase-banner" style="border-left-color:${ph.color}">
      <div class="pb-top"><b style="color:${ph.color}">${ph.phase_label || ph.name}</b>
        ${wk.deload ? '<span class="deload">· semaine d\'allègement</span>' : ""}</div>
      <p class="small muted" style="margin:6px 0 0">${ph.focus}</p>
    </div>
    <div class="week-grid">${days}</div>`;

  $("#prev-week").onclick = () => shiftWeek(-7);
  $("#next-week").onclick = () => shiftWeek(7);
  $$(".sess").forEach((s) => s.onclick = () => openDrawer(s.dataset.date, +s.dataset.idx));
}
let weekData = null;

function sessCard(planDate, idx, s) {
  if (s.sport === "rest") return `<div class="rest">😴 ${s.title}</div>`;
  const icon = { planned: "", done: "✅", skipped: "⛔️" }[s.status] || "";
  return `<div class="sess ${s.sport} ${s.status}" data-date="${planDate}" data-idx="${idx}">
    <div class="top"><span class="st">${s.emoji} ${s.title}</span><span class="stat">${icon}</span></div>
    <div class="sm">${s.duration_min ? s.duration_min + " min · " : ""}${s.zone}</div></div>`;
}

// ---------------- Drawer ----------------
function openDrawer(planDate, idx) {
  const day = weekData.days.find((d) => d.date === planDate);
  const s = day.sessions[idx];
  const color = SPORT_COLOR[s.sport] || "#8b97a8";
  const d = $("#drawer");
  d.innerHTML = `
    <button class="dr-close" id="dr-close">✕</button>
    <span class="dr-sport" style="background:${color}22;color:${color}">${s.emoji} ${SPORT_LABEL[s.sport] || s.sport}</span>
    <h2>${s.title}</h2>
    <div class="muted small">${day.weekday} ${fmtDate(planDate)}</div>
    <div class="dr-meta">
      ${s.duration_min ? `<div class="m"><div class="k">Durée</div><div class="v">${s.duration_min} min</div></div>` : ""}
      <div class="m"><div class="k">Intensité</div><div class="v">${s.zone}</div></div>
    </div>
    <div class="block-title" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:800;margin-bottom:8px">Consigne</div>
    <div class="dr-desc">${s.description}</div>
    <div class="dr-actions">
      <button class="btn ok ${s.status === "done" ? "sel" : "ghost"}" data-st="done">✅ Fait</button>
      <button class="btn bad ${s.status === "skipped" ? "sel" : "ghost"}" data-st="skipped">⛔️ Sauté</button>
      <button class="btn ghost ${s.status === "planned" ? "sel" : ""}" data-st="planned">↩︎ À faire</button>
    </div>`;
  $("#dr-close").onclick = closeDrawer;
  $$(".dr-actions .btn", d).forEach((b) => b.onclick = async () => {
    await api("/api/session-status", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan_date: planDate, slug: s.slug, status: b.dataset.st }),
    });
    closeDrawer(); await viewWeek(currentMonday);
  });
  d.classList.add("open"); $("#drawer-backdrop").classList.add("open");
}
function closeDrawer() { $("#drawer").classList.remove("open"); $("#drawer-backdrop").classList.remove("open"); }
$("#drawer-backdrop").onclick = closeDrawer;

function shiftWeek(delta) {
  const d = new Date(currentMonday + "T00:00:00"); d.setDate(d.getDate() + delta);
  viewWeek(d.toISOString().slice(0, 10));
}

async function viewLoad() {
  const o = await getOverview();
  const be = o.best_efforts;
  const hasEfforts = Object.keys(be).length > 0;
  const effortCards = ["run", "bike", "swim"].map((sp) => {
    const e = be[sp]; const ico = { run: "🏃", bike: "🚴", swim: "🏊" }[sp];
    return `<div class="card effort"><div class="sport-ico">${ico}</div>
      <div class="muted small">${SPORT_LABEL[sp]}</div>
      <div class="v" style="color:${SPORT_COLOR[sp]}">${e ? e.pace : "—"}</div>
      <div class="small muted">${e ? `${e.distance_km} km · ${fmtDate(e.date)}` : "pas encore de donnée"}</div></div>`;
  }).join("");

  $("#view").innerHTML = `
    <div class="card"><h2>Charge des 12 dernières semaines</h2>
      <canvas id="loadChart" height="120"></canvas>
      <p class="small muted" style="margin:14px 0 0">Minutes par sport. Synchronise Garmin pour remplir ce graphe.</p></div>
    <div class="section-title">Meilleures allures récentes</div>
    <div class="grid cols-3">${effortCards}</div>
    ${hasEfforts ? "" : '<p class="empty">Connecte Garmin et synchronise pour voir tes meilleures allures et ta charge réelle.</p>'}`;

  const { weekly } = await api("/api/load?weeks=12");
  const sports = ["run", "bike", "swim", "strength"];
  const datasets = sports.map((sp) => ({
    label: SPORT_LABEL[sp], backgroundColor: SPORT_COLOR[sp], borderRadius: 4,
    data: weekly.map((w) => w.by_sport_min[sp] || 0),
  }));
  new Chart($("#loadChart"), {
    type: "bar",
    data: { labels: weekly.map((w) => w.label), datasets },
    options: {
      responsive: true,
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { color: "#8b97a8" } },
        y: { stacked: true, grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#8b97a8" } },
      },
      plugins: { legend: { labels: { color: "#eef2f7", usePointStyle: true, pointStyle: "rectRounded" } } },
    },
  });
}

async function viewCoaching() {
  const c = await getCoaching();
  const ICONS = {
    polarized: '<path d="M3 12h4l3-8 4 16 3-8h4"/>',
    progressive: '<path d="M3 17 9 11l4 4 8-8"/><path d="M21 7v6h-6"/>',
    specificity: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.5" fill="currentColor"/>',
    recovery: '<path d="M12 21a9 9 0 1 1 9-9"/><path d="M12 7v5l3 2"/>',
    consistency: '<path d="M20 6 9 17l-5-5"/>',
    strength: '<path d="M6 7v10M18 7v10M3 9v6M21 9v6M6 12h12"/>',
  };
  const principles = c.principles.map((p) => `<div class="card principle">
    <div class="pic"><svg viewBox="0 0 24 24">${ICONS[p.icon] || ICONS.consistency}</svg></div>
    <div><h3>${p.title}</h3><p>${p.body}</p></div></div>`).join("");

  const strat = (s) => `<div class="card strat">
    <h2 class="with-eyebrow">${s.title}</h2><div class="goal-line">${s.goal_line}</div>
    <div class="block-title">Gestion de l'allure</div><ol>${s.pacing.map((x) => `<li>${x}</li>`).join("")}</ol>
    <div class="block-title">Avant la course</div><ul class="plain">${s.pre_race.map((x) => `<li>${x}</li>`).join("")}</ul>
    <div class="block-title">Mental</div><div class="mental">${s.mental}</div></div>`;

  $("#view").innerHTML = `
    <div class="section-title" style="margin-top:8px">Principes d'entraînement</div>
    <div class="grid cols-2">${principles}</div>
    <div class="section-title">Stratégies de course</div>
    <div class="grid cols-2">${strat(c.race_strategies["20km"])}${strat(c.race_strategies["703"])}</div>`;
}

// ---------------- Router ----------------
const ROUTES = { overview: viewOverview, plan: viewPlan, week: () => viewWeek(currentMonday), load: viewLoad, defis: viewDefis, coaching: viewCoaching };
async function render() {
  closeDrawer();
  const route = (location.hash.replace("#/", "") || "overview");
  const fn = ROUTES[route] || viewOverview;
  $$("#nav a").forEach((a) => a.classList.toggle("active", a.dataset.route === route));
  $("#view").innerHTML = '<div class="loading">Chargement…</div>';
  try { await topbar(route); await fn(); }
  catch (e) { $("#view").innerHTML = `<div class="errbar">⚠️ ${e.message}</div>`; }
}
window.addEventListener("hashchange", render);

(async () => {
  await renderGarminMini().catch(() => {});
  await render();
})();

</script>
