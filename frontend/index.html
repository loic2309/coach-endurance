<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coach Endurance — 20km & 70.3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CE</div>
        <div class="brand-text">
          <strong>Coach Endurance</strong>
          <span>20km · 70.3</span>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a href="#/overview" data-route="overview">
          <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg>
          <span>Vue d'ensemble</span>
        </a>
        <a href="#/plan" data-route="plan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
          <span>Mon plan</span>
        </a>
        <a href="#/week" data-route="week">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>Cette semaine</span>
        </a>
        <a href="#/progression" data-route="progression">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 14 3-4 3 3 4-6"/></svg>
          <span>Progression</span>
        </a>
        <a href="#/defis" data-route="defis">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M17 5h3v2a3 3 0 0 1-3 3M7 5H4v2a3 3 0 0 0 3 3"/></svg>
          <span>Défis</span>
        </a>
        <a href="#/coaching" data-route="coaching">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/></svg>
          <span>Conseils</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <div class="garmin-mini" id="garmin-mini"></div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Vue d'ensemble</h1>
          <p id="page-sub" class="page-sub"></p>
        </div>
        <div class="topbar-chips" id="topbar-chips"></div>
      </header>
      <main id="view" class="view"></main>
    </div>
  </div>

  <!-- Drawer (détail séance) -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer"></aside>

  <script src="/static/app.js"></script>
</body>
</html>
